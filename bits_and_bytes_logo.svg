  <!-- WORDMARK -->
  <!-- "bits" lowercase at 112px (-70 @ x&y)--> 
  <text x="54" y="224"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="135" font-weight="700" letter-spacing="-3"
